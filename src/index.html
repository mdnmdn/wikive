<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simple Wiki</title>
        <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <!-- Tailwind CSS with shadcn-style config -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            border: "hsl(var(--border))",
                            ring: "hsl(var(--ring))",
                            background: "hsl(var(--background))",
                            foreground: "hsl(var(--foreground))",
                            primary: {
                                DEFAULT: "hsl(var(--primary))",
                                foreground: "hsl(var(--primary-foreground))",
                            },
                            secondary: {
                                DEFAULT: "hsl(var(--secondary))",
                                foreground: "hsl(var(--secondary-foreground))",
                            },
                            destructive: {
                                DEFAULT: "hsl(var(--destructive))",
                                foreground:
                                    "hsl(var(--destructive-foreground))",
                            },
                            muted: {
                                DEFAULT: "hsl(var(--muted))",
                                foreground: "hsl(var(--muted-foreground))",
                            },
                            accent: {
                                DEFAULT: "hsl(var(--accent))",
                                foreground: "hsl(var(--accent-foreground))",
                            },
                        },
                    },
                },
            };
        </script>
        <style>
            :root {
                --background: 0 0% 100%;
                --foreground: 240 10% 3.9%;
                --muted: 260 30% 96%;
                --muted-foreground: 260 8% 45%;
                --accent: 260 20% 92%;
                --accent-foreground: 268 90% 45%;
                --primary: 268 90% 50%;
                --primary-foreground: 0 0% 100%;
                --secondary: 260 20% 92%;
                --secondary-foreground: 268 90% 45%;
                --destructive: 0 84.2% 60.2%;
                --destructive-foreground: 0 0% 98%;
                --border: 260 25% 88%;
                --ring: 268 90% 50%;
            }

            .dark {
                --background: 240 13% 11%;
                --foreground: 240 5% 96%;
                --muted: 268 25% 22%;
                --muted-foreground: 268 10% 65%;
                --accent: 268 65% 35%;
                --accent-foreground: 240 5% 96%;
                --primary: 268 85% 58%;
                --primary-foreground: 240 13% 11%;
                --secondary: 268 65% 35%;
                --secondary-foreground: 240 5% 96%;
                --destructive: 0 72% 58%;
                --destructive-foreground: 240 13% 11%;
                --border: 268 25% 28%;
                --ring: 268 85% 58%;
            }
        </style>

        <!-- highlight.js -->
        <link
            id="hljs-theme"
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

        <!-- Toast UI Editor -->
        <link
            rel="stylesheet"
            href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css"
        />
        <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

        <!-- Ace Editor for Snippets (Lazy Loading enabled) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ext-language_tools.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-monokai.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-github.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/mode-markdown.min.js"></script>

        <!-- App styles -->
        <link rel="stylesheet" href="css/app.css" />

        <!-- Excalidraw Web Component (built via components/excalidraw-webcomponent) -->
        <script src="js/excalidraw-wc.umd.js"></script>
    </head>
    <body>
        <div id="app"></div>

        <!-- Config -->
        <script src="config.js"></script>

        <!-- Vue 3 -->
        <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

        <!-- marked.js -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <!-- mermaid -->
        <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

        <!-- Google Identity Services -->
        <script>
            window.googleReady = new Promise((resolve) => {
                window.onGoogleLibraryLoad = resolve;
            });
        </script>
        <script
            src="https://accounts.google.com/gsi/client"
            onload="onGoogleLibraryLoad()"
            async
            defer
        ></script>

        <!-- App services -->
        <script src="js/services/cache.js"></script>
        <script src="js/services/auth.js"></script>
        <script src="js/services/drive.js"></script>
        <script src="js/services/document.js"></script>
        <script src="js/services/renderer.js"></script>
        <script src="js/services/markdown.js"></script>
        <script src="js/services/ace-mixin.js"></script>

        <!-- Renderers -->
        <script src="js/renderers/MarkdownViewer.js"></script>
        <script src="js/renderers/MarkdownEditor.js"></script>
        <script src="js/renderers/SnippetViewer.js"></script>
        <script src="js/renderers/SnippetEditor.js"></script>
        <script src="js/renderers/DrawingViewer.js"></script>
        <script src="js/renderers/DrawingEditor.js"></script>
        <script src="js/renderers/AssetViewer.js"></script>
        <script src="js/renderers/FolderViewer.js"></script>

        <!-- App components -->
        <script src="js/components/LoginScreen.js"></script>
        <script src="js/components/Breadcrumb.js"></script>
        <script src="js/components/AppHeader.js"></script>
        <script src="js/components/Sidebar.js"></script>
        <script src="js/components/PageNotFound.js"></script>
        <script src="js/components/DocumentRenderer.js"></script>

        <!-- App init -->
        <script src="js/app.js"></script>
    </body>
</html>
