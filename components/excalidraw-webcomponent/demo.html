<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excalidraw Web Component Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .container {
            flex: 1;
            border: 1px solid #ccc;
            position: relative;
        }
        excalidraw-component {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Excalidraw Web Component Demo</h1>
    
    <div class="controls">
        <button onclick="saveData()">Save to Console</button>
        <button onclick="loadData()">Load from Storage</button>
        <button onclick="exportPng()">Export PNG</button>
        <button onclick="zoomToFit()">Zoom to Fit</button>
        <button onclick="clearCanvas()">Clear</button>
    </div>

    <div class="container">
        <excalidraw-component id="excalidraw"></excalidraw-component>
    </div>

    <script src="dist/excalidraw-wc.umd.js"></script>
    <script>
        const el = document.getElementById('excalidraw');

        // Listen for changes
        el.addEventListener('change', (e) => {
            console.log('Excalidraw changed:', e.detail.elements.length, 'elements');
        });

        function saveData() {
            const json = el.save();
            console.log('Saved JSON:', json);
            localStorage.setItem('excalidraw-data', json);
            alert('Data saved to console and localStorage');
        }

        function loadData() {
            const json = localStorage.getItem('excalidraw-data');
            if (json) {
                el.load(json);
                alert('Data loaded');
            } else {
                alert('No data found in localStorage');
            }
        }

        async function exportPng() {
            const blob = await el.exportPng();
            if (blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'excalidraw-export.png';
                a.click();
                URL.revokeObjectURL(url);
            } else {
                alert('Canvas is empty or not ready');
            }
        }

        function zoomToFit() {
            el.zoomToFit();
        }

        function clearCanvas() {
            if (confirm('Are you sure?')) {
                el.clear();
            }
        }
    </script>
</body>
</html>
